name: Prepare the back-end environment
description: Install Python and the dependencies
runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install Python dependencies
      shell: bash
      run: uv sync --all-extras --dev 

    - name: Install npm
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install npm dependencies
      shell: bash
      run: npm install

    - name: Install Podman compose
      shell: bash
      run: sudo apt install podman-compose

    - name: Set up Podman
      shell: bash
      run: |
        # Start podman socket service
        sudo systemctl start podman.socket
        sudo systemctl status podman.socket

        # Verify socket exists
        sudo ls -l /run/podman/podman.sock

        # Make socket accessible (simpler approach for CI)
        sudo chmod 755 /run/podman
        sudo chmod 666 /run/podman/podman.sock

        # Verify socket works for $USER
        ls -l /run/podman/podman.sock
        sudo podman version
