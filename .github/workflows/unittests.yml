name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    strategy:
      fail-fast: false  
      matrix:
        # container-engine: [docker, podman]
        container-engine: [podman]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/prepare-dev
        env:
          CONTAINER_ENGINE: ${{ matrix.container-engine }}

      - name: Run unit tests
        run: uv run pytest -o env=ENV_FILE= tests/test_main.py
        env:
          GATEWAY_ORIGIN: http://localhost:9000
          DOCKER_PROJECT_NAME: getgather-ci
          DOCKER_SUBNET_PREFIX: 172.24.0
          HOST_DATA_DIR: ./data
          CONTAINER_ENGINE: ${{ matrix.container-engine }}
